<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>SULTAN_BLACK_HOLE_V3.5</title>
    <style>
        :root { --pwr: #00ff41; --bg: #000; --panel: #050505; }
        .emerald { --pwr: #00ff41; } .blood { --pwr: #f00; } .cobalt { --pwr: #0044ff; }
        * { margin:0; padding:0; box-sizing:border-box; touch-action:none; user-select:none; }
        body { background:var(--bg); color:var(--pwr); font-family:monospace; overflow:hidden; height:100vh; display:flex; flex-direction:column; }
        
        #hud { height:50px; padding:10px 20px; border-bottom:1px solid var(--pwr); display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.9); z-index:10; font-size:12px; }
        #viewport { flex-grow:1; position:relative; }
        #gl-canvas { width:100%; height:100%; display:block; }
        
        #controls { height:160px; background:var(--panel); border-top:1px solid var(--pwr); display:grid; grid-template-rows:1fr 1fr; gap:8px; padding:10px; padding-bottom:env(safe-area-inset-bottom); }
        .row { display:flex; gap:8px; }
        button { flex:1; background:#000; border:1px solid var(--pwr); color:var(--pwr); font-weight:900; border-radius:2px; font-size:10px; text-transform:uppercase; transition:0.1s; }
        button:active { background:var(--pwr); color:#000; }
        
        #loader { position:fixed; inset:0; background:#000; z-index:100; display:flex; flex-direction:column; justify-content:center; align-items:center; cursor:pointer; }
    </style>
</head>
<body class="emerald">

<div id="loader" onclick="initSystem()">
    <h1 style="color:var(--pwr); letter-spacing:10px;">BLACK_HOLE</h1>
    <p style="color:#444; margin-top:10px;">LOAD_SEQUENCE_01</p>
</div>

<div id="hud">
    <div id="coord">X:000 Y:2000</div>
    <div style="font-weight:900;">BH_MUSIC_BOX_v3.5</div>
    <div>BUFFER: <span id="p-count">0</span></div>
</div>

<div id="viewport"><canvas id="gl-canvas"></canvas></div>

<div id="controls">
    <div class="row">
        <button onclick="playNote('sine', 261.63)">C4</button>
        <button onclick="playNote('sine', 329.63)">E4</button>
        <button onclick="playNote('sine', 392.00)">G4</button>
        <button onclick="playNote('sine', 523.25)">C5</button>
    </div>
    <div class="row">
        <button onclick="setSkin('emerald')">EMR</button>
        <button onclick="setSkin('blood')">BLD</button>
        <button onclick="setSkin('cobalt')">COB</button>
        <button onclick="clearBuffer()" style="color:#f00; border-color:#f00;">PURGE</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    let scene, camera, renderer, hole, aCtx, reverb, nodes = [];
    const geoms = [
        new THREE.BoxGeometry(12, 12, 12),
        new THREE.TetrahedronGeometry(14),
        new THREE.TorusGeometry(8, 3, 8, 16),
        new THREE.SphereGeometry(8, 12, 12)
    ];

    function initSystem() {
        document.getElementById('loader').style.display = 'none';
        aCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Impulse Response for Deep Space Reverb
        const len = aCtx.sampleRate * 3, imp = aCtx.createBuffer(2, len, aCtx.sampleRate);
        for(let i=0; i<2; i++) {
            const ch = imp.getChannelData(i);
            for(let j=0; j<len; j++) ch[j] = (Math.random()*2-1) * Math.pow(1 - j/len, 3);
        }
        reverb = aCtx.createConvolver(); reverb.buffer = imp;
        reverb.connect(aCtx.destination);
        
        initVisuals();
    }

    function initVisuals() {
        const vp = document.getElementById('viewport');
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, vp.clientWidth / vp.clientHeight, 1, 3000);
        camera.position.z = 800;

        renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gl-canvas'), antialias: true, alpha: true });
        renderer.setSize(vp.clientWidth, vp.clientHeight);

        // The Event Horizon
        hole = new THREE.Mesh(
            new THREE.SphereGeometry(80, 32, 32),
            new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.8 })
        );
        const ring = new THREE.Mesh(
            new THREE.TorusGeometry(85, 2, 2, 100),
            new THREE.MeshBasicMaterial({ color: 0x00ff41, wireframe: true })
        );
        scene.add(hole, ring);

        animate();
    }

    function playNote(type, freq) {
        if(!aCtx) return;
        const osc = aCtx.createOscillator(), g = aCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, aCtx.currentTime);
        g.gain.setValueAtTime(0.1, aCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, aCtx.currentTime + 1.5);
        osc.connect(g); g.connect(reverb);
        osc.start(); osc.stop(aCtx.currentTime + 1.5);
        
        spawnNode(freq);
    }

    function spawnNode(freq) {
        const typeIdx = Math.floor(Math.random() * 4);
        const mat = new THREE.MeshBasicMaterial({ 
            color: getComputedStyle(document.body).getPropertyValue('--pwr'), 
            wireframe: true 
        });
        const mesh = new THREE.Mesh(geoms[typeIdx], mat);
        
        let angle = Math.random() * Math.PI * 2;
        let dist = 500 + Math.random() * 200;
        mesh.position.set(Math.cos(angle)*dist, Math.sin(angle)*dist, (Math.random()-0.5)*100);
        
        const node = {
            mesh: mesh,
            angle: angle,
            dist: dist,
            speed: 0.01 + (Math.random()*0.02),
            sink: 0.5 + (Math.random()*1.5),
            freq: freq
        };
        
        scene.add(mesh);
        nodes.push(node);
        document.getElementById('p-count').innerText = nodes.length;
    }

    function setSkin(s) { 
        document.body.className = s;
        const c = getComputedStyle(document.body).getPropertyValue('--pwr');
        scene.children.forEach(child => { if(child.material && child !== hole) child.material.color.set(c); });
    }

    function clearBuffer() {
        nodes.forEach(n => scene.remove(n.mesh));
        nodes = [];
        document.getElementById('p-count').innerText = 0;
    }

    function animate() {
        requestAnimationFrame(animate);
        
        nodes.forEach((n, i) => {
            n.angle += n.speed;
            n.dist -= n.sink; // Gravitational pull
            
            n.mesh.position.x = Math.cos(n.angle) * n.dist;
            n.mesh.position.y = Math.sin(n.angle) * n.dist;
            n.mesh.rotation.x += 0.05;
            n.mesh.rotation.y += 0.05;

            // Coordinate Tracking Overlay
            if(i === 0) {
                document.getElementById('coord').innerText = `X:${Math.floor(n.mesh.position.x)} Y:${Math.floor(n.dist)}`;
            }

            // Event Horizon Crossing
            if(n.dist < 85) {
                n.mesh.scale.multiplyScalar(0.9);
                if(n.dist < 10) {
                    scene.remove(n.mesh);
                    nodes.splice(i, 1);
                    document.getElementById('p-count').innerText = nodes.length;
                }
            }
        });

        renderer.render(scene, camera);
    }
</script>
</body>
</html>
