<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SULTAN_MOBILE_V2</title>
    <style>
        :root { --pwr: #ff0000; --accent: #fff; --bg: #000; --panel: #111; }
        .emerald { --pwr: #00ff41; } .solar { --pwr: #ffaa00; } .cobalt { --pwr: #0044ff; }
        .blood { --pwr: #f00; } .amber { --pwr: #ffeb3b; }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        body { 
            background: var(--bg); color: var(--pwr); font-family: monospace; 
            overflow: hidden; height: 100vh; display: flex; flex-direction: column; 
        }

        /* HUD: Fixed Height */
        #hud { 
            height: 80px; padding: 10px 15px; border-bottom: 1px solid var(--pwr);
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.9); z-index: 10;
        }

        /* VIEWPORT: Dynamic Height */
        #viewport { flex-grow: 1; position: relative; overflow: hidden; }
        #gl-canvas { width: 100%; height: 100%; display: block; }

        /* CONTROLS: Fixed Height */
        #controls { 
            height: 180px; background: var(--panel); border-top: 1px solid var(--pwr);
            display: flex; flex-direction: column; justify-content: space-evenly;
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        button { background: #000; border: 1px solid var(--pwr); color: var(--pwr); font-weight: bold; padding: 10px; border-radius: 4px; }
        .btn-theme { width: 35px; height: 35px; border-radius: 50%; padding: 0; }
        .row { display: flex; justify-content: space-evenly; width: 100%; gap: 5px; padding: 0 10px; }
        
        #loader { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #f00; cursor: pointer; }
    </style>
</head>
<body class="blood" id="app-body">
    <div id="loader" onclick="initSystem()">
        <h1 style="letter-spacing:5px">[ SULTAN_V2 ]</h1>
        <p>TAP TO INITIALIZE</p>
    </div>

    <div id="hud">
        <div><span>RPM: <b id="rpm-val">2.0</b></span><br><span>PTS: <b id="p-count">0</b></span></div>
        <div style="text-align:center; font-size: 12px;">NEGENTROPY<br><span id="status-msg" style="color:var(--accent)">STANDBY</span></div>
        <div style="text-align:right"><span>FPS: <b id="fps">60</b></span><br><span>VER: 2.1</span></div>
    </div>

    <div id="viewport"><canvas id="gl-canvas"></canvas></div>

    <div id="controls">
        <div class="row"><button id="btn-auto" style="width:100%" onclick="toggleAutoMode()">AUTO_SEQ: SYNTH_BEETHOVEN</button></div>
        <div class="row">
            <button style="flex:1" onclick="playManual('sine')">SINE</button>
            <button style="flex:1" onclick="playManual('triangle')">TRI</button>
            <button style="flex:1" onclick="playManual('square')">SQU</button>
            <button style="flex:1" onclick="playManual('sawtooth')">SAW</button>
        </div>
        <div class="row">
            <button class="btn-theme" onclick="setSkin('emerald')">E</button>
            <button class="btn-theme" onclick="setSkin('solar')">S</button>
            <button class="btn-theme" onclick="setSkin('cobalt')">C</button>
            <button class="btn-theme" onclick="setSkin('amber')">A</button>
            <button class="btn-theme" onclick="setSkin('blood')">B</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let audioCtx, reverbNode, scene, camera, renderer, singularity, points, pCount = 0, rpm = 2.0, isAuto = false;
        let lastTime = performance.now(), frameCount = 0;

        function initSystem() {
            document.getElementById('loader').style.display = 'none';
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const delay = audioCtx.createDelay();
            delay.delayTime.value = 0.4;
            const feedback = audioCtx.createGain();
            feedback.gain.value = 0.3;
            delay.connect(feedback); feedback.connect(delay);
            reverbNode = delay; reverbNode.connect(audioCtx.destination);
            initVisuals();
        }

        function initVisuals() {
            const vp = document.getElementById('viewport');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, vp.clientWidth / vp.clientHeight, 1, 3000);
            camera.position.z = 600;
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gl-canvas'), antialias: true, alpha: true });
            renderer.setSize(vp.clientWidth, vp.clientHeight);
            singularity = new THREE.Mesh(new THREE.IcosahedronGeometry(120, 1), new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: true, transparent: true, opacity: 0.5 }));
            scene.add(singularity);
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function onWindowResize() {
            const vp = document.getElementById('viewport');
            camera.aspect = vp.clientWidth / vp.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(vp.clientWidth, vp.clientHeight);
        }

        function buildParticles(targetCount) {
            if (points) scene.remove(points);
            pCount = Math.min(targetCount, 5000); // Caps for mobile performance
            const pArr = new Float32Array(pCount * 3);
            for(let i = 0; i < pCount; i++) {
                let r = 300 + Math.random() * 200, th = Math.random() * Math.PI * 2, phi = Math.acos(Math.random() * 2 - 1);
                pArr[i*3] = r * Math.sin(phi) * Math.cos(th); pArr[i*3+1] = r * Math.sin(phi) * Math.sin(th); pArr[i*3+2] = r * Math.cos(phi);
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pArr, 3));
            points = new THREE.Points(geo, new THREE.PointsMaterial({ size: 3, color: 0xffffff, transparent: true, opacity: 0.8 }));
            scene.add(points);
            document.getElementById('p-count').innerText = pCount;
        }

        function playTone(type, freq, dur = 0.5) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
            osc.connect(gain); gain.connect(reverbNode);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
            buildParticles(pCount + 50);
        }

        function playManual(type) { playTone(type, 440 + (Math.random() * 200)); }
        function setSkin(className) { document.getElementById('app-body').className = className; singularity.material.color.set(getComputedStyle(document.body).getPropertyValue('--pwr')); }
        function toggleAutoMode() { isAuto = !isAuto; document.getElementById('status-msg').innerText = isAuto ? "RUNNING" : "STANDBY"; }

        function animate() {
            requestAnimationFrame(animate);
            singularity.rotation.y += 0.01 * rpm;
            if (points) {
                const p = points.geometry.attributes.position.array;
                for(let i=0; i<pCount*3; i++) { p[i] *= 0.995; }
                points.geometry.attributes.position.needsUpdate = true;
            }
            const now = performance.now(); frameCount++;
            if (now - lastTime >= 1000) { document.getElementById('fps').innerText = frameCount; frameCount = 0; lastTime = now; }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
